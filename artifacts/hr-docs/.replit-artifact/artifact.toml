kind = "web"
previewPath = "/"
title = "HR-документы: Автоматизация"
version = "1.0.0"
id = "artifacts/hr-docs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18148

[services.development]
run = "pnpm --filter @workspace/hr-docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hr-docs", "run", "build" ]
publicDir = "artifacts/hr-docs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18148"
BASE_PATH = "/"
